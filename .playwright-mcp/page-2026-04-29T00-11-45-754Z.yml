    - region "Simple explanation" [ref=e75]:
      - generic [ref=e76]:
        - heading "Simple explanation of the main problem" [level=2] [ref=e77]
        - paragraph [ref=e78]:
          - text: The model only looks convincing because it does not compute the precise positions of the Sun, Moon and planets from a flat Earth at all. It takes ready-made astronomical coordinates from standard astronomy, converts them into a local sky for one specific observer, and only then redraws them onto a flat disk and dome. From the very beginning it stands on someone else’s correct result, not on its own FE geometry.
          - strong [ref=e79]: THIS IS NOT EVIDENCE FOR A FLAT EARTH. IT IS EVIDENCE THAT WITHOUT BORROWED RESULTS FROM STANDARD ASTRONOMY THIS MODEL CAN DO NOTHING AT ALL.
          - text: The whole trick is that the hardest part of the work has already been done in advance by ordinary astronomy. Correct data, correct orientation and a locally correct-looking sky all arrive ready-made. The FE layer adds no new explanation of reality; it merely repackages someone else’s result into a different drawing and pretends that it discovered something.
          - strong [ref=e80]: IF THIS IS PRESENTED AS EVIDENCE FOR A FLAT EARTH, IT IS MANIPULATION OF READY-MADE DATA, NOT AN HONEST AND TRUTHFUL MODEL OF REALITY.
          - text: But the moment you ask the model to do anything more than produce a locally impressive picture for one viewer, it falls apart immediately. A real model of reality must sustain one shared world for multiple observers at the same time, not a separate picture for each observer. No such consistent FE geometry exists here, which is why the model fails exactly when it is supposed to explain reality instead of merely creating an impression.
          - strong [ref=e81]: THIS IS NOT AN ALTERNATIVE COSMOLOGY OR ALTERNATIVE PHYSICS. IT IS A NON-FUNCTIONAL PSEUDO-MODEL THAT CANNOT SUSTAIN ONE CONSISTENT REALITY FOR MULTIPLE OBSERVERS AT ONCE.
          - generic [ref=e82]: That is why it is no longer enough to speak only about a mistake, a weakness or an unfinished model. If someone takes other people’s correct data, redraws them into an FE scene and sells that as confirmation of a flat Earth, they create the false impression that FE actually explains something. It is not a discovery, not alternative science, and not even an honest dead end. It is a misleading construction that rests on other people’s results and presents them as its own triumph.
          - strong [ref=e83]: IN THE END THIS IS NOT A DISCOVERY OR A WORKING EXPLANATION OF THE WORLD, BUT A FRAUD-LIKE PRESENTATION OF OTHER PEOPLE’S RESULTS DISGUISED AS FE.
          - generic [ref=e84]: "The method is simple but effective: you take external, verified results, redraw them into a different scene, hide their dependence on the original model, and present the whole thing as your own proof. This is exactly how FE projects mislead people and then profit from it by selling mugs, caps, maps and other goods or services while standing on work done by someone else. If you wanted to demonstrate the exact meaning of the word FRAUD, this is what it would look like."
          - strong [ref=e85]: FRAUD
          - emphasis [ref=e86]:
            - text: This entire “masquerade” is just a weak attempt to fool people who are unable or unwilling to verify reality for themselves. This “revolutionary” conceptual_flat_earth_model is in fact only a false lure on which various spreaders of this content make money, selling mugs, caps, maps or apps that in some cases even compromise private data such as home location, phone numbers or names. These people are frauds who built a business on deceiving others, including for example
            - strong [ref=e87]: Eric Dubay
            - text: ","
            - strong [ref=e88]: Mark Sargent
            - text: ","
            - strong [ref=e89]: David Weiss
            - text: ","
