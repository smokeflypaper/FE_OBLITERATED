    - region "Jednoduché vysvětlení" [ref=e101]:
      - generic [ref=e102]:
        - heading "Simple explanation of the main problem" [level=2] [ref=e103]
        - paragraph [ref=e104]:
          - text: The model looks convincing mainly because it does not predict the precise positions of the Sun, Moon and planets from a flat Earth. It takes ready-made astronomical coordinates from standard globe-based sources, turns them into a local sky for one specific observer, and only then draws them on a flat disk and dome.
          - strong [ref=e105]: "That visualization can be interesting, but it does not prove that FE geometry works. It shows the opposite: there is not, and cannot be, a functional FE model here."
          - text: "What it actually does is much weaker than a real world-model: it borrows the difficult part from standard astronomy, solves the visible sky in a normal spherical framework, and only afterwards wraps that solved answer in FE artwork. The impressive part is therefore not an FE prediction. It is a presentation layer placed on top of imported results."
          - strong [ref=e106]: This is not an alternative description of reality. It is a conversion of ready-made spherical sky data into a different drawing, and it breaks down as soon as you ask it to represent one shared world for multiple observers at once.
          - text: "That is why the central claim fails: a model of reality must provide one coherent geometry that many observers can inhabit together. This one only generates locally persuasive scenes while leaning on a framework it claims to replace."
          - text: It is a weak attempt to confuse people who do not check the mechanism for themselves. The whole conceptual_flat_earth_model is therefore just a false lure for people who profit from it, such as
          - strong [ref=e107]: Dominik Mrvík
          - text: in the Czech Republic and
          - strong [ref=e108]: Shane
          - text: elsewhere.
